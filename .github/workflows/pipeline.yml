name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - "week_2_mls/deployment/model/**"
      - "week_2_mls/data/processed/**"
      - "**/*.md"
      - ".devcontainer/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------- 1. Validate the raw dataset ----------
  data-register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r week_2_mls/requirements.txt

      - name: Validate dataset
        run: python week_2_mls/model_building/data_register.py

  # ---------- 2. Preprocess & split ----------
  data-preprocessing:
    needs: data-register
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r week_2_mls/requirements.txt

      - name: Prepare data
        run: python week_2_mls/model_building/prep.py

      - name: Upload processed data
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: week_2_mls/data/processed/
          retention-days: 1

  # ---------- 3. Train the model ----------
  model-training:
    needs: data-preprocessing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r week_2_mls/requirements.txt

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: week_2_mls/data/processed/

      - name: Train model
        run: python week_2_mls/model_building/train.py

      - name: Upload trained model
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: week_2_mls/deployment/model/
          retention-days: 1

  # ---------- 4. Commit model back to repo ----------
  deployment:
    needs: model-training
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download trained model
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: week_2_mls/deployment/model/

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: week_2_mls/data/processed/

      - name: Commit trained model back to the repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add week_2_mls/deployment/model/best_machine_failure_model_v1.joblib \
                  week_2_mls/data/processed/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update trained model [skip ci]"
            git pull --rebase origin main
            git push
          fi
